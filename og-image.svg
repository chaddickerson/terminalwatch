<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <rect width="1000" height="1000" fill="#f8f9fa"/>

  <!-- Left wing -->
  <path d="M400 350 Q360 315 340 265 Q370 285 440 300 Q420 320 400 350Z" fill="#0066cc" opacity="0.8"/>
  <path d="M410 365 Q370 350 350 315 Q380 325 440 330 Q425 345 410 365Z" fill="#0066cc" opacity="0.6"/>

  <!-- Right wing -->
  <path d="M600 350 Q640 315 660 265 Q630 285 560 300 Q580 320 600 350Z" fill="#0066cc" opacity="0.8"/>
  <path d="M590 365 Q630 350 650 315 Q620 325 560 330 Q575 345 590 365Z" fill="#0066cc" opacity="0.6"/>

  <!-- Clock face -->
  <circle cx="500" cy="340" r="65" fill="white" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Hour markers -->
  <line x1="500" y1="282" x2="500" y2="296" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="384" x2="500" y2="398" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="442" y1="340" x2="456" y2="340" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="544" y1="340" x2="558" y2="340" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="500" y1="340" x2="478" y2="305" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="500" y1="340" x2="526" y2="300" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="500" cy="340" r="4.5" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="500" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#1a1a1a">Terminal Watch</text>

  <!-- Subtitle -->
  <text x="500" y="540" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#666">Crowdsourced TSA Wait Times</text>

  <!-- URL -->
  <text x="500" y="585" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#0066cc">terminalwatch.info</text>
</svg>
