name: Update TSA wait times

on:
  schedule:
    # Run every hour at :15
    - cron: '15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tsa_watch.py LGA --terminal C --hours 72 --html

      - name: Copy output
        run: cp /tmp/tsa-watch-lga.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html stats.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update TSA wait times $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
