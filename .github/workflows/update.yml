name: Update TSA wait times

on:
  schedule:
    # Run every hour at :15
    - cron: '15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Archive current reports
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          for code in atl dfw den ord lax jfk clt las mco mia lga ewr; do
            if [ -f "${code}/index.html" ]; then
              mkdir -p "${code}/archive"
              cp "${code}/index.html" "${code}/archive/${TIMESTAMP}.html"
            fi
          done

      - name: Generate all reports
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          python tsa_watch.py --multi --output-dir . --archive-dir . --hours 72

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update TSA wait times $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
